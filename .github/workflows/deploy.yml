name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: 376567172837.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.ECR_REGISTRY }}/cms-fraud-detection-api
        run: |
          docker build -t $REPO:$IMAGE_TAG -t $REPO:latest .
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest
          echo "### Backend image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`$REPO:$IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"

  build-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.ECR_REGISTRY }}/cms-fraud-detection-frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://argus.precise-lab.com \
            -t $REPO:$IMAGE_TAG -t $REPO:latest \
            ./frontend
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest
          echo "### Frontend image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`$REPO:$IMAGE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
