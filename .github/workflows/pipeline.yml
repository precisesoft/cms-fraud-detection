name: Pipeline

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_NO_WARNINGS: "1"

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,72}$'

          if [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "✅ PR title is valid: $PR_TITLE"
          else
            echo "❌ PR title does not match conventional commit format."
            echo ""
            echo "Expected: type(scope): description"
            echo ""
            echo "  type  = feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert"
            echo "  scope = optional, e.g. (api), (ci), (pipeline)"
            echo "  description = lowercase, no period, under 72 chars"
            echo ""
            echo "Examples:"
            echo "  feat(api): add providers endpoint (#36)"
            echo "  fix(pipeline): handle null risk scores (#42)"
            echo "  ci(deps): add Dependabot configuration (#72)"
            echo ""
            echo "Got: $PR_TITLE"
            exit 1
          fi

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    steps:
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --config .gitleaks.toml --verbose --log-opts="$LOG_OPTS"
        env:
          LOG_OPTS: ${{ github.event_name == 'pull_request' && format('{0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || format('{0}...{1}', github.event.before, github.event.after) }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Check for HIGH severity findings
        run: |
          high_count=$(python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          high = [r for r in report.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(high))
          for r in high:
              print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']}\")
          ")
          echo "HIGH severity findings: ${high_count}"
          echo "### Bandit: ${high_count} HIGH severity findings" >> "$GITHUB_STEP_SUMMARY"
          if [ "$high_count" -gt 0 ]; then
            echo "::error::Bandit found ${high_count} HIGH severity issue(s)"
            exit 1
          fi

      - name: Run pip-audit (production deps only)
        run: |
          python -m venv /tmp/prod-venv
          /tmp/prod-venv/bin/pip install --quiet .
          /tmp/prod-venv/bin/pip freeze --exclude-editable > /tmp/prod-requirements.txt
          pip-audit -r /tmp/prod-requirements.txt --desc

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run npm audit
        run: cd frontend && npm audit --audit-level=critical  # high has known d3-color ReDoS (react-simple-maps transitive dep)

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  quality-backend:
    name: Quality (Backend)
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    env:
      COVERAGE_THRESHOLD: 95
    steps:
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,ml]"

      - name: Lint
        run: ruff check src/ tests/ && ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test
        env:
          JWT_SECRET_KEY: test-secret-for-ci-only-must-be-32-bytes!
        run: pytest --cov=src --cov-branch --cov-report=xml --cov-report=html --cov-report=term-missing -q

      - name: Coverage threshold check
        run: |
          coverage_pct=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          print(int(rate * 100))
          ")
          echo "Coverage: ${coverage_pct}%"
          echo "### Test Coverage: ${coverage_pct}%" >> "$GITHUB_STEP_SUMMARY"
          if [ "$coverage_pct" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "::error::Coverage ${coverage_pct}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  quality-frontend:
    name: Quality (Frontend)
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    steps:
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Test
        run: cd frontend && npx vitest run --coverage --reporter=verbose

      - name: Build
        run: cd frontend && npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [security, quality-backend, quality-frontend]
    # Explicit check: default success() skips when dependencies ran via always()
    if: |
      always() &&
      needs.security.result == 'success' &&
      needs.quality-backend.result == 'success' &&
      needs.quality-frontend.result == 'success'
    steps:
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --platform linux/amd64 -t cms-fraud-api:ci .

      - name: Save API image
        run: docker save cms-fraud-api:ci -o api-image.tar

      - name: Upload API image artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-image
          path: api-image.tar
          retention-days: 1

      - name: Build frontend image
        run: docker build --platform linux/amd64 -t cms-fraud-frontend:ci ./frontend

      - name: Save frontend image
        run: docker save cms-fraud-frontend:ci -o frontend-image.tar

      - name: Upload frontend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend-image.tar
          retention-days: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install production deps + cyclonedx-bom
        run: pip install . "cyclonedx-bom>=4.0"

      - name: Generate backend SBOM
        run: |
          cyclonedx-py environment \
            --pyproject pyproject.toml \
            --of json \
            --output-reproducible \
            -o sbom-backend.cdx.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Generate frontend SBOM
        run: cd frontend && npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file ../sbom-frontend.cdx.json 2> >(grep -v "^npm warn" >&2)

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-backend.cdx.json
            sbom-frontend.cdx.json
          retention-days: 14

  scan:
    name: Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    steps:
      - name: Download API image
        uses: actions/download-artifact@v4
        with:
          name: api-image

      - name: Download frontend image
        uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load Docker images
        run: |
          docker load < api-image.tar
          docker load < frontend-image.tar

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cms-fraud-api:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          output: trivy-api-report.txt

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cms-fraud-frontend:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          output: trivy-frontend-report.txt

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-api-report.txt
            trivy-frontend-report.txt
          retention-days: 14

  release:
    name: Release
    needs: [scan]
    if: |
      always() &&
      needs.scan.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: git config --global init.defaultBranch main
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.ECR_REGISTRY }}/cms-fraud-detection-api
        run: |
          docker build --platform linux/amd64 -t $REPO:$IMAGE_TAG -t $REPO:latest .
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push Frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REPO: ${{ env.ECR_REGISTRY }}/cms-fraud-detection-frontend
        run: |
          docker build --platform linux/amd64 -t $REPO:$IMAGE_TAG -t $REPO:latest ./frontend
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

  deploy:
    name: Deploy
    needs: [release]
    if: |
      always() &&
      needs.release.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update manifest repo for ArgoCD
        env:
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
          MANIFEST_REPO: ${{ vars.MANIFEST_REPO }}
          ECR: ${{ env.ECR_REGISTRY }}
        run: |
          update_file() {
            local file_path="k8s/cms-fraud/$1"
            local image_name="$2"

            # Get current content + blob SHA
            local response
            response=$(gh api "repos/${MANIFEST_REPO}/contents/${file_path}" --jq '{sha: .sha, content: .content}')
            local file_sha=$(echo "$response" | jq -r '.sha')
            local current=$(echo "$response" | jq -r '.content' | base64 -d)

            # Replace image tag
            local updated=$(echo "$current" | sed "s|${image_name}:.*|${image_name}:${SHA}|")

            # Skip if no change
            if [ "$current" = "$updated" ]; then
              echo "No change needed for $1"
              return
            fi

            # Push update via Contents API
            local new_content=$(echo "$updated" | base64 -w 0)
            gh api "repos/${MANIFEST_REPO}/contents/${file_path}" \
              -X PUT \
              -f message="deploy: update ${1} image to ${SHA:0:7}" \
              -f content="$new_content" \
              -f sha="$file_sha" \
              --silent
            echo "Updated $1 → ${SHA:0:7}"
          }

          update_file "api.yaml" "${ECR}/cms-fraud-detection-api"
          update_file "frontend.yaml" "${ECR}/cms-fraud-detection-frontend"
