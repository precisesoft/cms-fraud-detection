name: Pipeline

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "terraform/**"

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,72}$'

          if [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "✅ PR title is valid: $PR_TITLE"
          else
            echo "❌ PR title does not match conventional commit format."
            echo ""
            echo "Expected: type(scope): description"
            echo ""
            echo "  type  = feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert"
            echo "  scope = optional, e.g. (api), (ci), (pipeline)"
            echo "  description = lowercase, no period, under 72 chars"
            echo ""
            echo "Examples:"
            echo "  feat(api): add providers endpoint (#36)"
            echo "  fix(pipeline): handle null risk scores (#42)"
            echo "  ci(deps): add Dependabot configuration (#72)"
            echo ""
            echo "Got: $PR_TITLE"
            exit 1
          fi

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --config .gitleaks.toml --verbose --log-opts="$LOG_OPTS"
        env:
          LOG_OPTS: ${{ github.event_name == 'pull_request' && format('{0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || format('{0}...{1}', github.event.before, github.event.after) }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json
        continue-on-error: true

      - name: Check for HIGH severity findings
        run: |
          high_count=$(python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          high = [r for r in report.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(high))
          for r in high:
              print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']}\")
          ")
          echo "HIGH severity findings: ${high_count}"
          echo "### Bandit: ${high_count} HIGH severity findings" >> "$GITHUB_STEP_SUMMARY"
          if [ "$high_count" -gt 0 ]; then
            echo "::error::Bandit found ${high_count} HIGH severity issue(s)"
            exit 1
          fi

      - name: Run pip-audit
        run: pip-audit --skip-editable --desc

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run npm audit
        run: cd frontend && npm audit --audit-level=critical  # high has known d3-color ReDoS (react-simple-maps transitive dep)

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  quality-backend:
    name: Quality (Backend)
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    env:
      COVERAGE_THRESHOLD: 5  # ratchet up as test coverage grows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/ && ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test
        run: pytest --cov=src --cov-report=xml --cov-report=term -q

      - name: Coverage threshold check
        run: |
          coverage_pct=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          print(int(rate * 100))
          ")
          echo "Coverage: ${coverage_pct}%"
          echo "### Test Coverage: ${coverage_pct}%" >> "$GITHUB_STEP_SUMMARY"
          if [ "$coverage_pct" -lt "$COVERAGE_THRESHOLD" ]; then
            echo "::error::Coverage ${coverage_pct}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  quality-frontend:
    name: Quality (Frontend)
    runs-on: ubuntu-latest
    needs: [gate]
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build
