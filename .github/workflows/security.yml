name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pip-audit
        run: pip-audit --skip-editable --desc

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Check for HIGH severity findings
        run: |
          high_count=$(python -c "
          import json
          with open('bandit-report.json') as f:
              report = json.load(f)
          high = [r for r in report.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(high))
          for r in high:
              print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']}\")
          ")
          echo "HIGH severity findings: ${high_count}"
          echo "### Bandit: ${high_count} HIGH severity findings" >> "$GITHUB_STEP_SUMMARY"
          if [ "$high_count" -gt 0 ]; then
            echo "::error::Bandit found ${high_count} HIGH severity issue(s)"
            exit 1
          fi

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14
