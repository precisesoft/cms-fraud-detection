apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: cms-fraud
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/part-of: cms-fraud-detection
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          envFrom:
            - secretRef:
                name: neo4j-credentials
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["cypher-shell", "-u", "neo4j", "-p", "cms_graph_dev", "RETURN 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: cms-fraud
  labels:
    app.kubernetes.io/name: neo4j
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
  selector:
    app.kubernetes.io/name: neo4j
