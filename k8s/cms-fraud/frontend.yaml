apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cms-fraud
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: cms-fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: 376567172837.dkr.ecr.us-east-1.amazonaws.com/cms-fraud-detection-frontend:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cms-fraud
  labels:
    app.kubernetes.io/name: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app.kubernetes.io/name: frontend
