services:
  db:
    image: postgres:16-alpine
    container_name: cms-fraud-db
    environment:
      POSTGRES_DB: cms_fraud
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms_fraud"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: cms-fraud-neo4j
    environment:
      NEO4J_AUTH: neo4j/cms_graph_dev
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cms_graph_dev 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  neo4jdata:
